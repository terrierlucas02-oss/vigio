<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vigio — Formation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/formation.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-brand">
      <span class="nav-logo">⛑</span>
      <span class="nav-title">Vigio</span>
    </div>
    <div class="nav-links">
      <a href="../index.html">Accueil</a>
      <a href="guide.html">Guidage</a>
      <a href="chat.html">Assistant IA</a>
      <a href="quiz.html">Quiz</a>
    </div>
    <button class="btn-urgence" onclick="window.location.href='guide.html'">🚨 Urgence</button>
  </nav>

  <div class="page-container" style="max-width:1100px;">

    <div class="page-header">
      <a href="../index.html" class="back-btn">← Accueil</a>
      <h1 class="page-title">Formation</h1>
      <p class="page-subtitle">Apprenez les gestes qui sauvent. Cliquez sur une fiche pour la lire en détail.</p>
    </div>

    <!-- CATÉGORIES -->
    <div class="cat-tabs" id="cat-tabs">
      <button class="cat-tab active" onclick="filterCat('all')">Tout</button>
      <button class="cat-tab" onclick="filterCat('cardiaque')">❤️ Cardiaque</button>
      <button class="cat-tab" onclick="filterCat('respiration')">😮‍💨 Respiration</button>
      <button class="cat-tab" onclick="filterCat('trauma')">🩸 Traumatismes</button>
      <button class="cat-tab" onclick="filterCat('neurologie')">🧠 Neurologie</button>
      <button class="cat-tab" onclick="filterCat('autre')">🔥 Autre</button>
    </div>

    <!-- FICHES GRID -->
    <div class="fiches-grid" id="fiches-grid">
      <!-- généré par JS -->
    </div>

  </div>

  <!-- MODALE FICHE -->
  <div class="fiche-modal" id="fiche-modal" onclick="closeModal(event)">
    <div class="fiche-modal-inner">
      <div class="fiche-modal-header">
        <div>
          <div class="fiche-modal-icon" id="modal-icon"></div>
          <h2 class="fiche-modal-title" id="modal-title"></h2>
          <div id="modal-badge"></div>
        </div>
        <button class="modal-close" onclick="closeFiche()">✕</button>
      </div>
      <div class="fiche-modal-body" id="modal-body"></div>
      <div class="fiche-modal-footer">
        <a href="quiz.html" class="btn-secondary" style="font-size:14px;">🎯 Me tester sur cette fiche</a>
        <a href="guide.html" class="btn-primary" style="font-size:14px;">🚨 Guidage en urgence</a>
      </div>
    </div>
  </div>

  <footer class="footer" style="margin-top:80px;">
    <div class="footer-disclaimer">
      Vigio est un outil de formation. En cas d'urgence réelle, appelez le <strong>15</strong>, <strong>18</strong> ou <strong>112</strong>.
    </div>
  </footer>

  <script src="../js/vigio.js"></script>
  <script src="../js/formation.js"></script>
</body>
</html>
